name: Trigger JR Status Crawler

on:
  schedule:
    # Run every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Call Vercel Cron API
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://unkyu-hokkaido.jp/api/cron/crawl")
          if [ "$response" -ne 200 ]; then
            echo "❌ Crawler returned HTTP $response"
            exit 1
          fi
          echo "✅ Crawler executed successfully"

  monitor:
    runs-on: ubuntu-latest
    needs: crawl
    steps:
      - name: Call Vercel Monitor API
        run: |
          curl -s -f "https://unkyu-hokkaido.jp/api/system/monitor?key=${{ secrets.MONITOR_KEY }}"
